name: quill_diary
description: "Offline diary app with local LDJ2-encrypted Markdown vault and Recovery Key."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  drift: ^2.33.0
  sqlite3: ^3.3.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  cryptography: ^2.9.0
  cryptography_flutter: ^2.3.4
  yaml: ^3.1.3
  ulid: ^2.0.1
  flex_color_scheme: ^8.4.0
  dynamic_color: ^1.8.1
  skeletonizer: ^2.1.3
  phosphor_flutter: ^2.1.0
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1
  animations: ^2.2.0
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1
  image_picker: ^1.2.2
  flutter_image_compress: ^2.4.0
  file_picker: ^12.0.0-beta.5
  table_calendar: ^3.2.0
  flutter_svg: ^2.3.0
  flutter_secure_storage: ^10.2.0
  archive: ^4.0.9
  google_sign_in: ^7.2.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  googleapis: ^16.0.0
  intl: ^0.20.2
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc
